behaviors:
  TankBattlePPO:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 4096
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 4
      memory:
        memory_size: 128       
        sequence_length: 64  
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 2
    checkpoint_interval: 2000
    max_steps: 10000
    time_horizon: 256
    summary_freq: 200
env_settings:
  timeout_wait: 300
  max_lifetime_restarts: 3
  restarts_rate_limit_n: 3
  restarts_rate_limit_period_s: 300
